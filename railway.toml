# WebSocket 聊天信令服务（server.js）— 与 Vercel 上的 Next 前端配合使用。
# 使用 Dockerfile 构建：避免 Nixpacks 识别 Next 后二次 npm ci 与 /app/node_modules/.cache 缓存挂载冲突（EBUSY）。
# 文档: https://docs.railway.app/develop/cli/reference#configuration-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 30
